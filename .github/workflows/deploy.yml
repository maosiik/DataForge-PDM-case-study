name: Deploy Sphinx Documentation
on:
  push:
    branches: [ main ] # Server se spustí jen při pushi do větve main

# Nastavení oprávnění
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Server stáhne kód

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Nainstaluje Python

      - name: Install requirements
        run: |
          pip install -r requirements.txt # Nainstaluje Sphinx a pluginy ze seznamu

      - name: Build HTML
        run: |
          make html # Reálně "upeče" web (jako jsi to dělal na Macu)

      - name: Setup Pages
        uses: actions/configure-pages@v4 # Připraví prostředí pro publikaci

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/html' # Řekne serveru, kde je ten hotový web schovaný

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4